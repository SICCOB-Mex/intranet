    // =========================================================================
    // LÓGICA DEL SALUDO INTELIGENTE Y NOMBRE
    // =========================================================================
    function generarSaludo() {
        const fecha = new Date();
        const hora = fecha.getHours();
        let saludo = "";

        if (hora >= 6 && hora < 12) {
            saludo = "☀️ ¡Buen día";
        } else if (hora >= 12 && hora < 19) {
            saludo = "⛅ ¡Buena tarde";
        } else {
            saludo = "🌙 ¡Buena noche";
        }

        const usuario = sessionStorage.getItem('nombreUsuario') || "Usuario";
        document.getElementById('saludoDinamico').innerText = `${saludo}, ${usuario}!`;
    }

    // =========================================================================
    // REGLA: TEMPORIZADOR DE 1 HORA POR INACTIVIDAD TOTAL
    // =========================================================================
    const TIEMPO_INACTIVIDAD = 60 * 60 * 1000; // 1 hora
    let temporizadorInactividad;

    function cerrarSesion() {
        alert("Tu sesión ha finalizado.");
        sessionStorage.removeItem('sesionActiva');
        sessionStorage.removeItem('nombreUsuario');
        window.location.href = "index.html"; 
    }

    function reiniciarTemporizador() {
        clearTimeout(temporizadorInactividad);
        temporizadorInactividad = setTimeout(() => {
            cerrarSesion();
        }, TIEMPO_INACTIVIDAD);
    }

    // Detectores de actividad física para suspender/reiniciar el ciclo
    window.onmousemove = reiniciarTemporizador;
    window.onmousedown = reiniciarTemporizador; 
    window.onclick = reiniciarTemporizador;     
    window.onkeydown = reiniciarTemporizador;   
    window.onscroll = reiniciarTemporizador;    

    // Bloqueo F5 teclado físico
    window.addEventListener('keydown', function(e) {
        if (e.keyCode === 116 || (e.ctrlKey && e.keyCode === 82) || (e.metaKey && e.keyCode === 82)) {
            e.preventDefault();
            cerrarSesion();
        }
    });
</script>
